<!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
  <!DOCTYPE html>
<html>
<head>
    <title>Quiz App</title>
    
  <style>
    body {
    font-family: Arial;
    text-align: center;
    background: #f4f4f4;
}

.quiz-container {
    width: 400px;
    margin: auto;
    padding: 20px;
    background: white;
    margin-top: 100px;
    border-radius: 10px;
}

.btn {
    display: block;
    margin: 1px;
    padding: 10px;
    width: 100%;
    cursor: pointer;
}
  </style>
</head>
<body>

<div class="quiz-container">
    <h2 id="question">Question</h2>
    
    <div id="answers">
        <button class="btn" onclick="checkAnswer(0)">Option 1</button>
        <button class="btn" onclick="checkAnswer(1)">Option 2</button>
        <button class="btn" onclick="checkAnswer(2)">Option 3</button>
        <button class="btn" onclick="checkAnswer(3)">Option 4</button>
    </div>

    <button onclick="nextQuestion()">Next:</button>
</div>

  
<script>
  const quizData = [
    {
        question: "What is HTML?",
        options: ["Programming Language", "Markup Language", "Database", "OS"],
        correct: 1
    },
    {
        question: "Which is JS framework?",
        options: ["Django", "React", "Laravel", "Spring"],
        correct: 1
    },
    {
        question: "CSS stands for?",
        options: ["Color Style Sheet", "Cascading Style Sheet", "Computer Style Sheet", "Creative Style Sheet"],
        correct: 1
    }
];

let currentQuestion = 0;
let score = 0;

function loadQuestion() {
    let q = quizData[currentQuestion];
    document.getElementById("question").innerText = q.question;

    let buttons = document.getElementsByClassName("btn");
    for (let i = 0; i < buttons.length; i++) {
        buttons[i].innerText = q.options[i];
    }
}

function checkAnswer(index) {
    if (index === quizData[currentQuestion].correct) {
        score++;
    }
}

function nextQuestion() {
    currentQuestion++;
    if (currentQuestion < quizData.length) {
        loadQuestion();
    } else {
        document.body.innerHTML = `<h2>Your Score: ${score}</h2>`;
    }
}

loadQuestion();
</script>
</body>
</html>
</body>
